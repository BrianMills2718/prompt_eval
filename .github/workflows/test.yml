name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        env:
          LLM_CLIENT_REPO_TOKEN: ${{ secrets.LLM_CLIENT_REPO_TOKEN }}
        run: |
          pip install --upgrade pip
          if [ -z "${LLM_CLIENT_REPO_TOKEN}" ]; then
            echo "::error::prompt_eval CI requires LLM_CLIENT_REPO_TOKEN while BrianMills2718/llm_client is private for issue #30 containment."
            exit 1
          fi
          git config --global url."https://x-access-token:${LLM_CLIENT_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          pip install git+https://github.com/BrianMills2718/llm_client.git
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check prompt_eval/ tests/

      - name: Type check with mypy
        run: mypy prompt_eval/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -q
