name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-asyncio mypy ruff
          pip install git+https://github.com/BrianMills2718/llm_client.git
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check prompt_eval/ tests/

      - name: Type check with mypy
        run: mypy prompt_eval/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -q
